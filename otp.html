<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fcc100">
    <title>StayFit+ - OTP Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #fcc100;
            --primary-dark: #0a0a0a;
            --secondary-gold: #f0e68c;
            --text-light: #ffffff;
            --success-green: #4caf50;
            --error-red: #ff6b6b;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.95) 0%, rgba(25, 25, 35, 0.95) 100%), 
                        url(Images/2.png);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* MAIN CONTAINER */
        .otp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* OTP BOX */
        .otpbox {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 193, 0, 0.2);
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(252, 193, 0, 0.1);
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .otp-header {
            margin-bottom: 40px;
        }

        .otp-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(252, 193, 0, 0.1);
            border: 2px solid var(--primary-gold);
            border-radius: 50%;
            font-size: 32px;
            color: var(--primary-gold);
        }

        .otpbox h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-gold);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .otp-subtitle {
            font-size: 14px;
            color: rgba(240, 230, 140, 0.7);
            margin-bottom: 30px;
        }

        /* FORM GROUP */
        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .otpbox label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary-gold);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .otpbox input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(252, 193, 0, 0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 18px;
            font-family: inherit;
            letter-spacing: 4px;
            text-align: center;
            transition: var(--transition);
            font-weight: 600;
        }

        .otpbox input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: normal;
        }

        .otpbox input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(252, 193, 0, 0.1);
        }

        /* VERIFY BUTTON */
        .verify-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #e6b000 100%);
            color: var(--primary-dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(252, 193, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 193, 0, 0.35);
        }

        .verify-btn:active {
            transform: translateY(0);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* MESSAGE STYLES */
        #msg {
            margin-top: 24px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #msg.show {
            display: block;
        }

        #msg.error {
            background: rgba(255, 107, 107, 0.2);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        #msg.success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-green);
            border: 1px solid var(--success-green);
        }

        /* TIMER */
        .timer {
            font-size: 13px;
            color: rgba(240, 230, 140, 0.6);
            margin-top: 16px;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .otp-container {
                padding: 30px 20px;
                min-height: 100vh;
            }

            .otpbox {
                max-width: 100%;
                padding: 40px 30px;
            }

            .otp-icon {
                width: 50px;
                height: 50px;
                font-size: 28px;
            }

            .otpbox h1 {
                font-size: 24px;
                margin-bottom: 8px;
            }

            .otp-subtitle {
                font-size: 13px;
            }

            .otpbox input {
                padding: 12px 14px;
                font-size: 16px;
            }

            .verify-btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .otp-container {
                padding: 20px 15px;
                min-height: 100vh;
            }

            .otpbox {
                padding: 35px 25px;
            }

            .otp-header {
                margin-bottom: 30px;
            }

            .otp-icon {
                width: 45px;
                height: 45px;
                margin-bottom: 15px;
                font-size: 24px;
            }

            .otpbox h1 {
                font-size: 20px;
                margin-bottom: 6px;
            }

            .otp-subtitle {
                font-size: 12px;
                margin-bottom: 25px;
            }

            .form-group {
                margin-bottom: 24px;
            }

            .otpbox label {
                font-size: 13px;
                margin-bottom: 10px;
            }

            .otpbox input {
                padding: 11px 12px;
                font-size: 14px;
                letter-spacing: 3px;
            }

            .verify-btn {
                padding: 11px 18px;
                font-size: 13px;
                gap: 6px;
            }

            #msg {
                margin-top: 18px;
                padding: 10px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="otp-container">
        <div class="otpbox">
            <div class="otp-header">
                <div class="otp-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1>Verify OTP</h1>
                <p class="otp-subtitle">Enter the 4-digit code sent to your registered mobile</p>
            </div>

            <div class="form-group">
                <label for="otpinput">One-Time Password:</label>
                <input id="otpinput" type="text" placeholder="0000" maxlength="4" inputmode="numeric">
            </div>

            <button class="verify-btn" onclick="verify()">
                <i class="fa-solid fa-shield-halved"></i> Verify OTP
            </button>

            <div id="msg"></div>
            <div class="timer">⏱️ Expires in <span id="timer">02:00</span></div>
        </div>
    </div>

    <script>
        const otpInput = document.getElementById("otpinput");
        const messageBox = document.getElementById("msg");
        const timerDisplay = document.getElementById("timer");
        let timeRemaining = 120;

        // Only allow numeric input
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 4) {
                verify();
            }
        });

        // Timer countdown
        function startTimer() {
            const interval = setInterval(() => {
                timeRemaining--;
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                if (timeRemaining === 0) {
                    clearInterval(interval);
                    otpInput.disabled = true;
                    messageBox.className = 'show error';
                    messageBox.textContent = '✗ OTP expired. Please request a new one.';
                }
            }, 1000);
        }

        function verify() {
            const userOtp = otpInput.value.trim();

            messageBox.className = '';
            messageBox.textContent = '';

            if (!userOtp) {
                messageBox.className = 'show error';
                messageBox.textContent = '⚠️ Please enter OTP';
                return;
            }

            if (userOtp.length !== 4) {
                messageBox.className = 'show error';
                messageBox.textContent = '⚠️ OTP must be 4 digits';
                return;
            }

            // Verify OTP
            if (userOtp === "1234") {
                messageBox.className = 'show success';
                messageBox.textContent = '✓ OTP verified successfully! Redirecting...';
                otpInput.disabled = true;
                setTimeout(() => {
                    location = "Session_page.html";
                }, 1500);
            } else {
                messageBox.className = 'show error';
                messageBox.textContent = '✗ Invalid OTP. Please try again.';
                otpInput.value = '';
                otpInput.focus();
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verify();
            }
        });

        // Start timer on page load
        window.addEventListener('load', startTimer);
    </script>
</body>
</html>
