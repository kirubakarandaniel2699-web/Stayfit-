<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fcc100">
    <title>StayFit+ - Candidate Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #fcc100;
            --primary-dark: #0a0a0a;
            --secondary-gold: #f0e68c;
            --text-light: #ffffff;
            --success-green: #4caf50;
            --error-red: #ff6b6b;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.95) 0%, rgba(25, 25, 35, 0.95) 100%), 
                        url(Images/2.png);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* TOPBAR STYLES */
        .topbar {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
        }

        .backbtn {
            background: transparent;
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            text-decoration: none;
        }

        .backbtn:hover {
            background: var(--primary-gold);
            color: var(--primary-dark);
            transform: translateX(-5px);
        }

        /* MAIN CONTAINER */
        .start {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            animation: fadeIn 0.6s ease-out;
        }

        /*@keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }*/

        .start img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(252, 193, 0, 0.3);
            animation: slideDown 0.6s ease-out;
        }

        /*@keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }*/

        .start h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-gold);
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* FORM STYLES */
        form {
            width: 100%;
            max-width: 400px;
            animation: scaleIn 0.6s ease-out;
        }

        /*@keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }*/

        .userdet {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(252, 193, 0, 0.2);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(252, 193, 0, 0.1);
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .userdet label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .userdet input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(252, 193, 0, 0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 16px;
            font-family: inherit;
            transition: var(--transition);
        }

        .userdet input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .userdet input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 3px rgba(252, 193, 0, 0.1);
        }

        .userdet input:valid {
            border-color: var(--success-green);
        }

        /* LOGIN BUTTON */
        #result {
            width: 100%;
            padding: 14px 24px;
            margin-top: 30px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #e6b000 100%);
            color: var(--primary-dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(252, 193, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #result:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 193, 0, 0.35);
        }

        #result:active {
            transform: translateY(0);
        }

        #result:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* MESSAGE STYLES */
        #message {
            margin-top: 20px;
            padding: 12px 16px;
            text-align: center;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #message.error {
            background: rgba(255, 107, 107, 0.2);
            color: var(--error-red);
            border: 1px solid var(--error-red);
        }

        #message.success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success-green);
            border: 1px solid var(--success-green);
        }

        /* CAPTCHA SECTION */
        .captcha-section {
            background: rgba(252, 193, 0, 0.05);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(252, 193, 0, 0.2);
            margin-bottom: 24px;
        }

        .captcha-section label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary-gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #captchabox {
            background: rgba(10, 10, 10, 0.8) !important;
            border: 2px dashed var(--primary-gold) !important;
            font-size: 20px !important;
            font-weight: bold !important;
            letter-spacing: 3px !important;
            text-align: center !important;
            padding: 12px !important;
            margin-bottom: 12px !important;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .topbar {
                padding: 15px;
            }

            .start {
                padding: 30px 15px;
                min-height: calc(100vh - 60px);
            }

            .start img {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
            }

            .start h1 {
                font-size: 28px;
                margin-bottom: 30px;
            }

            form {
                max-width: 90%;
            }

            .userdet {
                padding: 30px 20px;
            }

            .userdet label {
                font-size: 13px;
            }

            .userdet input {
                padding: 10px 12px;
                font-size: 16px;
            }

            #result {
                padding: 12px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .start {
                padding: 20px 15px;
            }

            .start img {
                width: 70px;
                height: 70px;
                margin-bottom: 15px;
            }

            .start h1 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            form {
                max-width: 100%;
            }

            .userdet {
                padding: 25px 18px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .userdet label {
                font-size: 12px;
            }

            .userdet input {
                padding: 10px 12px;
                font-size: 14px;
            }

            #result {
                padding: 11px 18px;
                font-size: 13px;
                gap: 6px;
            }

            .captcha-section {
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="Sessions.html" style="text-decoration: none;">
            <button class="backbtn">
                <i class="fa-solid fa-arrow-left"></i> Back to Login
            </button>
        </a>
    </div>

    <section class="start">
        <img src="Images/Updated Logo.png" alt="StayFit+ Logo">
        <h1>StayFit+ Login</h1>

        <form>
            <fieldset class="userdet">
                <div class="form-group">
                    <label for="lab1">Username:</label>
                    <input id="lab1" type="text" placeholder="Enter Email ID or Mobile Number" required>
                </div>

                <div class="form-group">
                    <label for="lab2">Password:</label>
                    <input id="lab2" type="password" placeholder="Enter 4 Digit PIN" required>
                </div>

                <div class="captcha-section">
                    <label for="captchabox">Security Code:</label>
                    <input id="captchabox" type="text" readonly>
                    <input id="captcha" type="text" placeholder="Enter the security code above" required>
                </div>

                <button type="button" id="result" onclick="login()">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>

                <div id="message"></div>
            </fieldset>
        </form>
    </section>

    <script>
        const field1 = document.getElementById("lab1");
        const field2 = document.getElementById("lab2");
        const captcha = document.getElementById("captcha");
        const captchabox = document.getElementById("captchabox");
        const msg = document.getElementById("message");

        // Generate random captcha on page load
        function generateCaptcha() {
            const random = Math.floor(Math.random() * 25000) + 10000;
            captchabox.value = random;
            return random;
        }

        let currentCaptcha = generateCaptcha();

        function login() {
            const lab1 = field1.value.trim();
            const lab2 = field2.value.trim();
            const usercaptcha = captcha.value.trim();

            msg.className = '';
            msg.textContent = '';

            // Validation
            if (!lab1 || !lab2 || !usercaptcha) {
                msg.className = 'error';
                msg.textContent = '⚠️ Please fill all fields';
                return;
            }

            if (lab1 === "admin" && lab2 === "1234" && usercaptcha == currentCaptcha) {
                msg.className = 'success';
                msg.textContent = '✓ Login successful! Redirecting...';
                setTimeout(() => {
                    location = "otp.html";
                }, 1500);
            } else {
                msg.className = 'error';
                msg.textContent = '✗ Invalid credentials or security code';
                captcha.value = '';
                currentCaptcha = generateCaptcha();
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
