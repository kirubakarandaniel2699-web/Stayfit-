/* ============================================================
   GLOBAL VARIABLES
   ============================================================ */
var qty       = 1;
var isLiked   = false;
var currentId = 1;


/* ============================================================
   1. FORMAT PRICE
      Takes a number, returns ₹ formatted string
   ============================================================ */
function formatPrice(number) {
    var formatted = number.toLocaleString('en-IN');
    return '₹' + formatted;
}


/* ============================================================
   2. SAVE PERCENTAGE
      Calculates how much % discount is given
   ============================================================ */
function savePercent(currentPrice, oldPrice) {
    var fraction = 1 - (currentPrice / oldPrice);
    var percent  = Math.round(fraction * 100);
    return percent;
}


/* ============================================================
   3. BUILD STAR STRING
      Converts 4.8 into ★★★★½
   ============================================================ */
function buildStars(rating) {
    var fullStars = Math.floor(rating);
    var hasHalf   = (rating - fullStars) >= 0.5;
    var stars     = '';

    for (var i = 0; i < fullStars; i++) {
        stars = stars + '★';
    }

    if (hasHalf) {
        stars = stars + '½';
    }

    return stars;
}


/* ============================================================
   4. GET PRODUCT BY ID
      Loops through PRODUCTS array and returns the match
   ============================================================ */
function getProductById(id) {
    for (var i = 0; i < PRODUCTS.length; i++) {
        if (PRODUCTS[i].id === id) {
            return PRODUCTS[i];
        }
    }
    return null;
}


/* ============================================================
   5. BUILD THUMBNAIL HTML
      Creates thumbnail strip HTML from product image
   ============================================================ */
function buildThumbnails(imgSrc) {
    var html = '';

    // Show same image twice as front/back placeholder
    for (var i = 0; i < 2; i++) {
        var activeClass = '';
        if (i === 0) {
            activeClass = 'active';
        }

        html = html + '<div class="pd-thumb-item ' + activeClass + '" onclick="selectThumb(this, \'' + imgSrc + '\')">';
        html = html + '<img src="' + imgSrc + '" alt="">';
        html = html + '</div>';
    }

    return html;
}


/* ============================================================
   6. BUILD SPECS TABLE HTML
      Loops through specs array and creates table rows
   ============================================================ */
function buildSpecsTable(specs) {
    var html = '';

    for (var i = 0; i < specs.length; i++) {
        var label = specs[i][0];
        var value = specs[i][1];

        html = html + '<tr>';
        html = html + '<td>' + label + '</td>';
        html = html + '<td>' + value + '</td>';
        html = html + '</tr>';
    }

    return html;
}


/* ============================================================
   7. BUILD REVIEWS HTML
      Loops through userReviews and creates review cards
   ============================================================ */
function buildReviews(userReviews) {
    var html = '';

    for (var i = 0; i < userReviews.length; i++) {
        var review = userReviews[i];

        // Get initials from name (e.g. "Rohan K." → "RK")
        var words    = review.a.split(' ');
        var initials = '';
        for (var j = 0; j < words.length; j++) {
            initials = initials + words[j][0];
        }

        // Build filled stars
        var filledStars = '';
        for (var k = 0; k < review.s; k++) {
            filledStars = filledStars + '★';
        }

        // Build empty stars
        var emptyStars = '';
        for (var m = 0; m < (5 - review.s); m++) {
            emptyStars = emptyStars + '☆';
        }

        html = html + '<div class="pd-review-card">';
        html = html + '  <div class="pd-rev-top">';
        html = html + '    <div class="pd-rev-avatar">' + initials + '</div>';
        html = html + '    <div>';
        html = html + '      <div class="pd-rev-author">' + review.a + '</div>';
        html = html + '      <div class="pd-rev-stars">' + filledStars + emptyStars + '</div>';
        html = html + '    </div>';
        html = html + '  </div>';
        html = html + '  <div class="pd-rev-text">' + review.t + '</div>';
        html = html + '</div>';
    }

    html = html + '<p style="font-size:13px;color:#888;margin-top:16px;">';
    html = html + '  <a href="#" style="color:#3B6D11;font-weight:600;">+ Write your own review</a>';
    html = html + '</p>';

    return html;
}


/* ============================================================
   8. BUILD TAGS STRING
      Joins tag array into a comma separated string
   ============================================================ */
function buildTags(tags) {
    var result = '';

    for (var i = 0; i < tags.length; i++) {
        if (i > 0) {
            result = result + ', ';
        }
        result = result + tags[i];
    }

    return result;
}


/* ============================================================
   9. RENDER PRODUCT
      Fills all HTML elements with the selected product data
   ============================================================ */
function render() {
    var product = getProductById(currentId);

    if (product === null) {
        return;
    }

    var discount = savePercent(product.price, product.was);

    // Page title and hero
    document.title                                    = product.name + ' – StayFit+';
    document.getElementById('heroTitle').textContent  = product.name;
    document.getElementById('bcName').textContent     = product.name;

    // Image section
    document.getElementById('pdThumbs').innerHTML     = buildThumbnails(product.img);
    document.getElementById('pdMainImg').src          = product.img;
    document.getElementById('pdMainImg').alt          = product.name;
    document.getElementById('pdBadge').textContent    = discount + '% OFF';

    // Product info
    document.getElementById('pdSku').textContent      = product.sku;
    document.getElementById('pdTitle').textContent    = product.name;
    document.getElementById('pdStarsSm').textContent  = buildStars(product.rating);
    document.getElementById('pdRatingSm').textContent = product.rating.toFixed(1) + ' (' + product.reviews + ' reviews)';
    document.getElementById('pdDesc').textContent     = product.desc;

    // Price
    document.getElementById('pdPrice').textContent    = formatPrice(product.price);
    document.getElementById('pdWas').textContent      = formatPrice(product.was);
    document.getElementById('pdSave').textContent     = 'Save ' + discount + '%';

    // Meta info
    document.getElementById('pdMeta').innerHTML =
        '<div><span class="pd-meta-label">Categories: </span>' + product.cat + '</div>' +
        '<div><span class="pd-meta-label">Brand: </span><a href="#">' + product.brand + '</a></div>' +
        '<div><span class="pd-meta-label">Tags: </span>' + buildTags(product.tags) + '</div>';

    // Tabs
    document.getElementById('specsTable').innerHTML   = buildSpecsTable(product.specs);
    document.getElementById('moreInfoText').textContent = product.desc + ' This product is covered by StayFit+ quality assurance and ships free on orders above ₹999.';
    document.getElementById('reviewsList').innerHTML  = buildReviews(product.userReviews);

    // Reset quantity and wishlist
    qty     = 1;
    isLiked = false;
    document.getElementById('qtyNum').value           = 1;
    document.getElementById('wishBtn').textContent    = '♡';
    document.getElementById('wishBtn').classList.remove('active');
}


/* ============================================================
   10. SELECT THUMBNAIL
       Highlights the clicked thumbnail and swaps main image
   ============================================================ */
function selectThumb(clickedEl, imgSrc) {
    // Remove active from all thumbnails
    var allThumbs = document.querySelectorAll('.pd-thumb-item');
    for (var i = 0; i < allThumbs.length; i++) {
        allThumbs[i].classList.remove('active');
    }

    // Add active to the clicked one
    clickedEl.classList.add('active');

    // Change the main image
    document.getElementById('pdMainImg').src = imgSrc;
}


/* ============================================================
   11. CHANGE QUANTITY
       +1 or -1, stays between 1 and 99
   ============================================================ */
function changeQty(direction) {
    qty = qty + direction;

    if (qty < 1)  { qty = 1;  }
    if (qty > 99) { qty = 99; }

    document.getElementById('qtyNum').value = qty;
}


/* ============================================================
   12. ADD TO CART
       Changes button text and colour, resets after 2 seconds
   ============================================================ */
function addToCart() {
    var btn = document.getElementById('cartBtn');

    btn.textContent      = '✓ Added!';
    btn.style.background = '#3B6D11';

    setTimeout(function() {
        btn.textContent      = 'Add to Cart';
        btn.style.background = '';
    }, 2000);
}


/* ============================================================
   13. TOGGLE WISHLIST
       Switches heart between empty ♡ and filled ♥
   ============================================================ */
function toggleWish() {
    var btn = document.getElementById('wishBtn');

    isLiked = !isLiked;

    if (isLiked) {
        btn.textContent = '♥';
        btn.classList.add('active');
    } else {
        btn.textContent = '♡';
        btn.classList.remove('active');
    }
}


/* ============================================================
   14. OPEN TAB
       Hides all tabs, shows only the selected one
   ============================================================ */
function openTab(tabName) {
    // Hide all tab content panels
    var allPanels = document.querySelectorAll('.pd-tab-content');
    for (var i = 0; i < allPanels.length; i++) {
        allPanels[i].classList.remove('active');
    }

    // Remove active from all tab buttons
    var allButtons = document.querySelectorAll('.pd-tab-btn');
    for (var j = 0; j < allButtons.length; j++) {
        allButtons[j].classList.remove('active');
    }

    // Show the selected panel
    document.getElementById('tab-' + tabName).classList.add('active');

    // Highlight the matching button
    var activeBtn = document.getElementById('btn-' + tabName);
    if (activeBtn !== null) {
        activeBtn.classList.add('active');
    }
}


/* ============================================================
   15. TOGGLE DARK MODE
       Adds/removes dark-mode class on body
   ============================================================ */
function toggleMode() {
    var body = document.body;
    var btn  = document.getElementById('modeBtn');

    if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        btn.textContent = '🌙';
    } else {
        body.classList.add('dark-mode');
        btn.textContent = '☀️';
    }
}


/* ============================================================
   START — Read product ID from URL and render
   ============================================================ */
var params = new URLSearchParams(window.location.search);
var idFromUrl = parseInt(params.get('id'));

if (idFromUrl) {
    currentId = idFromUrl;
}

// Make sure the ID exists, otherwise default to 1
var found = false;
for (var i = 0; i < PRODUCTS.length; i++) {
    if (PRODUCTS[i].id === currentId) {
        found = true;
    }
}
if (found === false) {
    currentId = 1;
}

render();

</script>
